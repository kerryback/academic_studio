name: Release

# Build all three platforms on GitHub's runners and publish them to a GitHub
# Release. Trigger by pushing a version tag that matches the product version,
# e.g.  git tag v0.2 && git push origin v0.2
# (workflow_dispatch lets you run it by hand for testing; it publishes to
# v<academicStudioVersion> from overlay/product.overrides.json.)
#
# Builds are UNSIGNED here. Signing in CI needs secrets + a CI-friendly cert
# (Apple notarization, Azure Trusted Signing, or SignPath); see docs/SIGNING.md.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write   # needed to create/update the Release

env:
  NODE_VERSION: '22.22.1'

jobs:
  # ---------------------------------------------------------------- macOS (arm64)
  build-macos:
    runs-on: macos-14   # Apple Silicon
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22.22.1' }
      - name: Clone build engine (VSCodium)
        run: |
          git clone --depth 1 https://github.com/VSCodium/vscodium.git build-engine
          ( cd build-engine && git remote rename origin upstream )
      - name: Build .dmg
        run: SKIP_ASSETS=no bash scripts/build-macos.sh
      - uses: actions/upload-artifact@v4
        with:
          name: assets-macos
          path: build-engine/assets/*
          if-no-files-found: error

  # ------------------------------------------------------------- Windows x64
  build-windows-x64:
    runs-on: windows-latest
    defaults:
      run: { shell: bash }
    steps:
      - uses: actions/checkout@v4
      - name: Enable long paths
        run: git config --global core.longpaths true
      - uses: actions/setup-node@v4
        with: { node-version: '22.22.1' }
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - name: Install Inno Setup + 7-Zip + jq
        shell: pwsh
        run: choco install innosetup 7zip jq -y --no-progress
      - name: Put Inno Setup + 7-Zip on PATH
        run: |
          echo "/c/Program Files (x86)/Inno Setup 6" >> "$GITHUB_PATH"
          echo "/c/Program Files/7-Zip" >> "$GITHUB_PATH"
      - name: Clone build engine (VSCodium)
        run: |
          git clone --depth 1 https://github.com/VSCodium/vscodium.git build-engine
          ( cd build-engine && git remote rename origin upstream )
      - name: Build installers (x64)
        run: SKIP_ASSETS=no bash scripts/build-windows-x64.sh
      - uses: actions/upload-artifact@v4
        with:
          name: assets-win-x64
          path: build-engine/assets/*
          if-no-files-found: error

  # ------------------------------------------------------------- Windows ARM64
  build-windows-arm64:
    runs-on: windows-11-arm   # GitHub-hosted Windows-on-ARM runner
    defaults:
      run: { shell: bash }
    steps:
      - uses: actions/checkout@v4
      - name: Enable long paths
        run: git config --global core.longpaths true
      - uses: actions/setup-node@v4
        with: { node-version: '22.22.1' }
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - name: Install Inno Setup + 7-Zip + jq
        shell: pwsh
        run: choco install innosetup 7zip jq -y --no-progress
      - name: Put Inno Setup + 7-Zip on PATH
        run: |
          echo "/c/Program Files (x86)/Inno Setup 6" >> "$GITHUB_PATH"
          echo "/c/Program Files/7-Zip" >> "$GITHUB_PATH"
      - name: Clone build engine (VSCodium)
        run: |
          git clone --depth 1 https://github.com/VSCodium/vscodium.git build-engine
          ( cd build-engine && git remote rename origin upstream )
      - name: Build installers (arm64)
        run: SKIP_ASSETS=no bash scripts/build-windows-arm64.sh
      - uses: actions/upload-artifact@v4
        with:
          name: assets-win-arm64
          path: build-engine/assets/*
          if-no-files-found: error

  # ------------------------------------------------------------- Publish
  publish:
    needs: [build-macos, build-windows-x64, build-windows-arm64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Collect all built installers
        uses: actions/download-artifact@v4
        with:
          path: build-engine/assets
          merge-multiple: true   # flatten all artifacts into one dir
      - name: Publish to the GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/make-release.sh
