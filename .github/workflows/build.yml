name: Build (unsigned)

# Build all three installers on GitHub's runners and upload them as workflow
# ARTIFACTS (never published to a Release). You then download each artifact to
# the right machine, sign it there, and publish with scripts/make-release.sh:
#   - macOS arm64  -> this Mac (Developer ID + notarize)
#   - Windows x64  -> Windows machine (signtool)
#   - Windows arm64-> Windows machine (signtool)
#
# See the `academic-studio-release` skill for the full step-by-step.
#
# Run it by hand from the Actions tab, or:  gh workflow run build.yml
# Version comes from academicStudioVersion in overlay/product.overrides.json, so
# bump + commit that first if you're cutting a new version.

on:
  workflow_dispatch:

permissions:
  contents: read

# Pinned versions — keep in sync with scripts/versions.sh. Bump VSCODIUM_REF
# deliberately (it drags in a new VS Code version and new patch context; test a
# local build first), never implicitly.
env:
  NODE_VERSION: '22.22.1'
  VSCODIUM_REF: 'eb5d6e23a9abe76460a22e41cccacf7a7d5fea96'

jobs:
  # ---------------------------------------------------------------- macOS (arm64)
  build-macos:
    runs-on: macos-14   # Apple Silicon
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "${{ env.NODE_VERSION }}" }
      - name: Clone build engine (VSCodium, pinned)
        run: |
          mkdir build-engine && cd build-engine
          git init -q
          git remote add upstream https://github.com/VSCodium/vscodium.git
          git fetch --depth 1 upstream "$VSCODIUM_REF"
          git checkout -q FETCH_HEAD
      # The bundled .vsix extensions are gitignored (regenerable); a fresh CI
      # checkout has none. --pinned downloads exactly the versions in the
      # committed manifest and verifies their sha256, so CI builds are
      # reproducible (never a silent "latest").
      - name: Fetch bundled extensions (Open VSX, pinned)
        run: bash scripts/fetch-extensions.sh darwin-arm64 --pinned
      - name: Build (unsigned .app + dmg)
        env:
          # @vscode/ripgrep downloads its prebuilt binary from GitHub during the
          # build; unauthenticated requests get 403 rate-limited. Authenticate.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: SKIP_ASSETS=no bash scripts/build-macos.sh
      # Ship the unsigned .app (not the dmg) so it can be signed + notarized on the
      # Mac. ditto preserves the bundle's symlinks/xattrs, which a plain zip breaks.
      - name: Archive unsigned .app
        run: |
          cd build-engine/VSCode-darwin-arm64
          ditto -c -k --sequesterRsrc --keepParent "Academic Studio.app" \
            "$GITHUB_WORKSPACE/AcademicStudio-macos-arm64-unsigned-app.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: macos-arm64-unsigned-app
          path: AcademicStudio-macos-arm64-unsigned-app.zip
          if-no-files-found: error

  # ------------------------------------------------------------- Windows x64
  build-windows-x64:
    # Pin to windows-2022: windows-latest moved to windows-2025, where node-gyp's
    # Visual Studio finder can't locate the C++ toolchain (build fails at native
    # module rebuild). windows-2022 ships VS 2022 + "Desktop development with C++".
    runs-on: windows-2022
    defaults:
      run: { shell: bash }
    steps:
      - uses: actions/checkout@v4
      - name: Enable long paths
        run: git config --global core.longpaths true
      - uses: actions/setup-node@v4
        with: { node-version: "${{ env.NODE_VERSION }}" }
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - name: Install Inno Setup + 7-Zip + jq + unzip
        shell: pwsh
        run: choco install innosetup 7zip jq unzip -y --no-progress
      - name: Put Inno Setup + 7-Zip on PATH
        run: |
          echo "/c/Program Files (x86)/Inno Setup 6" >> "$GITHUB_PATH"
          echo "/c/Program Files/7-Zip" >> "$GITHUB_PATH"
      # The runner's node (via Git Bash) doesn't always expose ProgramFiles, so
      # VSCodium's preinstall.ts can't find Visual Studio ("Invalid C/C++ Compiler
      # Toolchain"). Locate VS with vswhere and set vs2022_install explicitly.
      - name: Point the build at Visual Studio (vs2022_install)
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vs = & $vswhere -latest -products * -property installationPath
          if (-not $vs) { Write-Error "No Visual Studio install found via vswhere"; exit 1 }
          "vs2022_install=$vs" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Write-Host "vs2022_install=$vs"
      - name: Clone build engine (VSCodium, pinned)
        run: |
          mkdir build-engine && cd build-engine
          git init -q
          git remote add upstream https://github.com/VSCodium/vscodium.git
          git fetch --depth 1 upstream "$VSCODIUM_REF"
          git checkout -q FETCH_HEAD
      - name: Fetch bundled extensions (Open VSX, pinned)
        run: bash scripts/fetch-extensions.sh win32-x64 --pinned
      - name: Build installer (x64, unsigned)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # @vscode/ripgrep download (avoid 403 rate-limit)
        run: SKIP_ASSETS=no bash scripts/build-windows-x64.sh
      - uses: actions/upload-artifact@v4
        with:
          name: windows-x64-unsigned
          path: build-engine/assets/*.exe
          if-no-files-found: error

  # ------------------------------------------------------------- Windows ARM64
  build-windows-arm64:
    runs-on: windows-11-arm   # GitHub-hosted Windows-on-ARM runner
    defaults:
      run: { shell: bash }
    steps:
      - uses: actions/checkout@v4
      - name: Enable long paths
        run: git config --global core.longpaths true
      - uses: actions/setup-node@v4
        with: { node-version: "${{ env.NODE_VERSION }}" }
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - name: Install Inno Setup + 7-Zip + jq + unzip
        shell: pwsh
        run: choco install innosetup 7zip jq unzip -y --no-progress
      - name: Put Inno Setup + 7-Zip on PATH
        run: |
          echo "/c/Program Files (x86)/Inno Setup 6" >> "$GITHUB_PATH"
          echo "/c/Program Files/7-Zip" >> "$GITHUB_PATH"
      # The runner's node (via Git Bash) doesn't always expose ProgramFiles, so
      # VSCodium's preinstall.ts can't find Visual Studio ("Invalid C/C++ Compiler
      # Toolchain"). Locate VS with vswhere and set vs2022_install explicitly.
      - name: Point the build at Visual Studio (vs2022_install)
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vs = & $vswhere -latest -products * -property installationPath
          if (-not $vs) { Write-Error "No Visual Studio install found via vswhere"; exit 1 }
          "vs2022_install=$vs" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Write-Host "vs2022_install=$vs"
      - name: Clone build engine (VSCodium, pinned)
        run: |
          mkdir build-engine && cd build-engine
          git init -q
          git remote add upstream https://github.com/VSCodium/vscodium.git
          git fetch --depth 1 upstream "$VSCODIUM_REF"
          git checkout -q FETCH_HEAD
      - name: Fetch bundled extensions (Open VSX, pinned)
        run: bash scripts/fetch-extensions.sh win32-arm64 --pinned
      - name: Build installer (arm64, unsigned)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # @vscode/ripgrep download (avoid 403 rate-limit)
        run: SKIP_ASSETS=no bash scripts/build-windows-arm64.sh
      - uses: actions/upload-artifact@v4
        with:
          name: windows-arm64-unsigned
          path: build-engine/assets/*.exe
          if-no-files-found: error
